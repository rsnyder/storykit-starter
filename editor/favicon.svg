<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" role="img" aria-label="StoryKit Editor">
  <!-- StoryKit Editor mark: a story page — prose lines above, media below.
       Single accent color so it sits naturally in both themes. -->
  <rect x="2" y="2" width="60" height="60" rx="14" fill="#0969da"/>
  <!-- prose lines -->
  <rect x="14" y="14" width="36" height="5.5" rx="2.75" fill="#ffffff" opacity="0.95"/>
  <rect x="14" y="24" width="26" height="5.5" rx="2.75" fill="#ffffff" opacity="0.75"/>
  <!-- media pane: image with sun + ridge -->
  <rect x="14" y="34" width="36" height="16" rx="4" fill="#ffffff" opacity="0.95"/>
  <circle cx="22.5" cy="40.5" r="2.6" fill="#0969da"/>
  <path d="M17 50 l8.5 -7 5.5 4.5 7-6 12 8.5 z" fill="#0969da"/>
</svg>
