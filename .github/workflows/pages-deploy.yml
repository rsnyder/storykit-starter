name: "Build and Deploy"
on:
  push:
    branches:
      - main
      - master
    paths-ignore:
      - .gitignore
      - README.md
      - LICENSE

  # Allows you to run this workflow manually from the Actions tab
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Allow one concurrent deployment
concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0
          # submodules: true
          # If using the 'assets' git submodule from Chirpy Starter, uncomment above
          # (See: https://github.com/cotes2020/chirpy-starter/tree/main/assets)

      - name: Setup Pages
        id: pages
        uses: actions/configure-pages@v5
        with:
          # Create/enable the Pages site (source: GitHub Actions) if it isn't already
          enablement: true

      - name: Setup Ruby
        uses: ruby/setup-ruby@v1
        with:
          # Ruby version is read from .ruby-version so local and CI builds stay in sync
          bundler-cache: true

      - name: Build site
        run: bundle exec jekyll b -d "_site${{ steps.pages.outputs.base_path }}"
        env:
          JEKYLL_ENV: "production"

      - name: Check repo consistency
        run: python3 tools/check_consistency.py

      - name: Check drift against storykit-starter
        # Reports (but does not block on) differences between this repo's framework
        # files and the canonical rsnyder/storykit-starter repo. Drift is expected
        # while local improvements await upstreaming; this step makes it visible.
        run: python3 tools/sync_code.py --check
        continue-on-error: true

      - name: Test site
        run: |
          bundle exec htmlproofer "_site${{ steps.pages.outputs.base_path }}" \
            --disable-external \
            --no-enforce-https \
            --swap-urls "^${{ steps.pages.outputs.base_path }}/:/" \
            --ignore-files "/assets\/components\//" \
            --ignore-urls "/^Q[0-9]+$/,/\/(zoomto|flyto|playat|play|pause)\//,/^http:\/\/127\.0\.0\.1/,/^http:\/\/0\.0\.0\.0/,/^http:\/\/localhost/"

      - name: Upload site artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: "_site${{ steps.pages.outputs.base_path }}"

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
