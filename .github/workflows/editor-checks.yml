name: "Editor checks"

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: "editor-checks-${{ github.ref }}"
  cancel-in-progress: true

jobs:
  editor-checks:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Ruby
        uses: ruby/setup-ruby@v1
        with:
          # Ruby version is read from .ruby-version so local and CI builds stay in sync
          bundler-cache: true

      - name: Build site
        run: bundle exec jekyll build
        env:
          JEKYLL_ENV: "production"

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Playwright (Python)
        run: pip install playwright pytest

      - name: Resolve Playwright version
        id: playwright-version
        run: echo "version=$(pip show playwright | awk '/^Version:/{print $2}')" >> "$GITHUB_OUTPUT"

      - name: Cache Playwright browsers
        id: playwright-cache
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-chromium-${{ runner.os }}-${{ steps.playwright-version.outputs.version }}

      - name: Install Chromium (Playwright)
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        run: playwright install chromium --with-deps

      - name: Render regression (--check)
        run: python tools/render_regression.py --check

      - name: Browser unit tests
        run: python tools/run_browser_tests.py

      - name: Viewer catalog drift check
        run: python tools/check_viewer_catalog.py

      - name: Editor import-map pin check
        run: python tools/check_editor_pins.py

      - name: M2 persistence e2e (Playwright)
        # Drives editor/index.html end to end: create → type → restart the
        # persistent browser context → assert nothing is lost; autosave window;
        # 50 KB responsiveness; StoryKit tag highlighting. esm.sh module loads
        # run live (as the browser unit suite already does).
        run: python -m pytest tests/e2e/ -v
